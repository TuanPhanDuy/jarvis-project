apiVersion: apps/v1
kind: Deployment
metadata:
  name: jarvis-api
  namespace: jarvis
  labels:
    app: jarvis-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jarvis-api
  template:
    metadata:
      labels:
        app: jarvis-api
    spec:
      containers:
        - name: jarvis-api
          image: jarvis:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: jarvis-config
            - secretRef:
                name: jarvis-secrets
          volumeMounts:
            - name: reports
              mountPath: /app/reports
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: reports-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: jarvis-api
  namespace: jarvis
spec:
  selector:
    app: jarvis-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: jarvis-api
  namespace: jarvis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jarvis-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: reports-pvc
  namespace: jarvis
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
