apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: jarvis
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: jarvis
data:
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: JARVIS
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/provisioning/dashboards
  jarvis.json: |
    {
      "title": "JARVIS Overview",
      "uid": "jarvis-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Total Requests",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "targets": [{ "datasource": "prometheus", "expr": "sum(jarvis_requests_total)", "legendFormat": "requests" }],
          "options": { "colorMode": "background", "graphMode": "area" }
        },
        {
          "id": 2, "type": "stat", "title": "Active WebSocket Connections",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "targets": [{ "datasource": "prometheus", "expr": "jarvis_active_websocket_connections", "legendFormat": "connections" }],
          "options": { "colorMode": "background" }
        },
        {
          "id": 3, "type": "stat", "title": "Estimated Cost (USD)",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "targets": [{ "datasource": "prometheus", "expr": "jarvis_cost_usd_total", "legendFormat": "USD" }],
          "options": { "colorMode": "background", "graphMode": "area" },
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 4 } }
        },
        {
          "id": 4, "type": "stat", "title": "Total Tokens (Input)",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "targets": [{ "datasource": "prometheus", "expr": "jarvis_tokens_total{token_type=\"input\"}", "legendFormat": "input tokens" }],
          "options": { "colorMode": "value" }
        },
        {
          "id": 5, "type": "timeseries", "title": "Requests per Minute",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [
            { "datasource": "prometheus", "expr": "rate(jarvis_requests_total[1m]) * 60", "legendFormat": "{{mode}}" }
          ]
        },
        {
          "id": 6, "type": "timeseries", "title": "Request Duration (p95)",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "targets": [
            { "datasource": "prometheus", "expr": "histogram_quantile(0.95, rate(jarvis_request_duration_seconds_bucket[5m]))", "legendFormat": "p95 {{mode}}" }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 7, "type": "barchart", "title": "Tool Calls by Type",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "targets": [
            { "datasource": "prometheus", "expr": "sum by(tool_name)(jarvis_tool_calls_total)", "legendFormat": "{{tool_name}}" }
          ]
        },
        {
          "id": 8, "type": "timeseries", "title": "Token Usage Over Time",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "targets": [
            { "datasource": "prometheus", "expr": "rate(jarvis_tokens_total[5m]) * 300", "legendFormat": "{{token_type}}" }
          ]
        },
        {
          "id": 9, "type": "stat", "title": "Queue Tasks Processed",
          "gridPos": { "x": 0, "y": 20, "w": 6, "h": 4 },
          "targets": [{ "datasource": "prometheus", "expr": "sum(jarvis_queue_tasks_processed_total)", "legendFormat": "processed" }],
          "options": { "colorMode": "background" }
        },
        {
          "id": 10, "type": "stat", "title": "Queue Errors",
          "gridPos": { "x": 6, "y": 20, "w": 6, "h": 4 },
          "targets": [{ "datasource": "prometheus", "expr": "jarvis_queue_tasks_processed_total{status=\"error\"}", "legendFormat": "errors" }],
          "options": { "colorMode": "background" },
          "fieldConfig": { "defaults": { "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "red", "value": 1 }] } } }
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: jarvis
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: data
          emptyDir: {}
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: jarvis
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
